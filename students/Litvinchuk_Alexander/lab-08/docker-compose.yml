version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  session_service:
    build: .
    command: uvicorn services.session_service.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - rabbitmq
    ports:
      - "8000:8000"

  task_service:
    build: .
    command: uvicorn services.task_service.main:app --host 0.0.0.0 --port 8001
    depends_on:
      - rabbitmq
    ports:
      - "8001:8001"

  notification_service:
    build: .
    command: python services/notification_service/main.py
    depends_on:
      - rabbitmq